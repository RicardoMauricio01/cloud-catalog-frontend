<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Catálogo de Productos</title>

        <!-- Material Icons -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
        />

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- Global styles -->
        <link rel="stylesheet" href="../../css/styles.css" />

        <!-- Catalog styles -->
        <link rel="stylesheet" href="../../css/catalogo.css" />
    </head>

    <body>
        <main class="catalog-page">
            <div class="catalog-container">
                <div class="table-responsive">
                    <div class="table-wrapper">
                        <div class="table-title">
                            <h2>Gestionar Productos</h2>

                            <div class="table-actions">
                                <button
                                    type="button"
                                    class="btn btn-success"
                                    data-bs-toggle="modal"
                                    data-bs-target="#addProductModal"
                                >
                                    <i class="material-icons align-middle">
                                        add_circle
                                    </i>
                                    Añadir producto
                                </button>

                                <button
                                    id="bulkDeleteBtn"
                                    class="btn btn-danger"
                                    disabled
                                    data-bs-toggle="modal"
                                    data-bs-target="#deleteProductModal"
                                >
                                    <i class="material-icons align-middle">
                                        delete
                                    </i>
                                    Eliminar
                                </button>
                            </div>
                        </div>

                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>
                                        <input
                                            type="checkbox"
                                            class="form-check-input"
                                            id="selectAll"
                                        />
                                    </th>

                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>

                            <tbody id="products-table"></tbody>
                        </table>

                        <div
                            class="d-flex justify-content-between align-items-center flex-wrap gap-3"
                        >
                            <div class="hint-text" id="pagination-info">
                                Mostrando 0 de 0 entradas
                            </div>

                            <nav>
                                <ul
                                    class="pagination mb-0"
                                    id="pagination"
                                ></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ADD MODAL -->
        <div class="modal fade" id="addProductModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form id="addProductForm">
                        <div class="modal-header">
                            <h5 class="modal-title">Añadir Producto</h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>

                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="addNombre" class="form-label">
                                    Nombre
                                </label>

                                <input
                                    id="addNombre"
                                    type="text"
                                    class="form-control"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label for="addPrecio" class="form-label">
                                    Precio
                                </label>

                                <input
                                    id="addPrecio"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    step="0.01"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label for="addStock" class="form-label"
                                    >Stock</label
                                >

                                <input
                                    id="addStock"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    required
                                />
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>

                            <button type="submit" class="btn btn-success">
                                Añadir
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- EDIT MODAL -->
        <div class="modal fade" id="editProductModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form id="editProductForm">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar Producto</h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>

                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="editId" class="form-label"
                                    >ID</label
                                >

                                <input
                                    id="editId"
                                    type="text"
                                    class="form-control"
                                    readonly
                                />
                            </div>
                            <div class="mb-3">
                                <label for="editNombre" class="form-label"
                                    >Nombre</label
                                >

                                <input
                                    id="editNombre"
                                    type="text"
                                    class="form-control"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label for="editPrecio" class="form-label"
                                    >Precio</label
                                >

                                <input
                                    id="editPrecio"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    step="0.01"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label for="editStock" class="form-label"
                                    >Stock</label
                                >

                                <input
                                    id="editStock"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    required
                                />
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>

                            <button type="submit" class="btn btn-primary">
                                Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- DELETE MODAL -->
        <div class="modal fade" id="deleteProductModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form id="deleteProductForm">
                        <div class="modal-header">
                            <h5 class="modal-title">Eliminar Producto</h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>

                        <div class="modal-body">
                            <div class="delete-warning">
                                <span class="material-icons"> warning </span>

                                <p>
                                    ¿Está seguro que desea eliminar
                                    <strong id="deleteProductName">
                                        este producto</strong
                                    >?
                                </p>

                                <small>
                                    Esta acción no se puede deshacer.
                                </small>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>

                            <button type="submit" class="btn btn-danger">
                                Eliminar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../js/catalogo.js"></script>
    </body>
</html>
