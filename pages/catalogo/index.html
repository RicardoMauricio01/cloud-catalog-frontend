<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Cloud Catalog | Catálogo</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- Material -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
        />

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- TU MISMO CSS GLOBAL -->
        <link rel="stylesheet" href="../../css/styles.css" />
        <link rel="stylesheet" href="../../css/inventario.css" />
        <link rel="stylesheet" href="../../css/catalogo.css" />
    </head>

    <body>
        <!-- HEADER (igual al inventario) -->
        <header class="topbar">
            <div class="header-inner">
                <div class="brand-wrapper">
                    <span class="material-symbols-outlined brand-icon">
                        storefront
                    </span>

                    <div class="brand-text">
                        <span class="brand-title">Cloud Catalog</span>
                        <span class="brand-sub">Catálogo de productos</span>
                    </div>
                </div>

                <div class="top-actions">
                    <button type="button" class="admin-btn">
                        <span class="material-symbols-outlined"
                            >visibility</span
                        >
                        Cliente
                    </button>
                </div>
            </div>
        </header>

        <!-- NAV (igual estructura, pero sin acciones admin) -->
        <nav class="dashboard-nav">
            <div class="nav-inner">
                <a href="#" class="dashboard-link active">
                    <span class="material-symbols-outlined">inventory</span>
                    Productos
                </a>

                <a href="#" class="dashboard-link">
                    <span class="material-symbols-outlined">category</span>
                    Categorías
                </a>
            </div>
        </nav>

        <!-- CONTENT -->
        <main class="catalog-page">
            <div class="catalog-layout">
                <!-- SIDEBAR -->
                <aside class="sidebar">
                    <h3>Categorías</h3>

                    <button class="cat-btn active" data-category="all">
                        Todas
                    </button>

                    <button class="cat-btn" data-category="1">
                        Electrónica
                    </button>

                    <button class="cat-btn" data-category="2">Hogar</button>

                    <button class="cat-btn" data-category="3">Oficina</button>
                </aside>

                <!-- GRID -->
                <section class="catalog-content">
                    <div id="products-grid" class="products-grid"></div>
                </section>
            </div>
            <section class="catalog-content">
                <div id="products-grid" class="products-grid"></div>
            </section>
        </main>

        <!-- FOOTER (igual al inventario) -->
        <footer class="main-footer">
            <div class="footer-inner">
                <p>© 2026 Cloud Catalog — Sistema de gestión de inventario</p>
            </div>
        </footer>

        <script src="../../js/catalogo.js"></script>
    </body>
</html>
