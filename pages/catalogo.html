<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Catálogo de Productos</title>

        <!-- Fonts -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round"
        />

        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
        />

        <!-- Bootstrap 5 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- Custom CSS -->
        <link rel="stylesheet" href="/frontend/css/catalogo.css" />
    </head>

    <body>
        <div class="container py-4">
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <h2>Gestionar <b>Productos</b></h2>
                            </div>

                            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                                <button
                                    class="btn btn-success"
                                    data-bs-toggle="modal"
                                    data-bs-target="#addProductModal"
                                >
                                    <i class="material-icons align-middle">
                                        add_circle
                                    </i>
                                    Añadir producto
                                </button>

                                <button
                                    class="btn btn-danger"
                                    data-bs-toggle="modal"
                                    data-bs-target="#deleteProductModal"
                                >
                                    <i class="material-icons align-middle">
                                        delete
                                    </i>
                                    Eliminar
                                </button>
                            </div>
                        </div>
                    </div>

                    <tbody id="products-table">
                        <table
                            class="table table-striped table-hover align-middle"
                        >
                            <thead>
                                <tr>
                                    <th>
                                        <input
                                            type="checkbox"
                                            class="form-check-input"
                                            id="selectAll"
                                        />
                                    </th>

                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>

                            <tbody id="products-table"></tbody>
                        </table>
                    </tbody>

                    <div
                        class="d-flex justify-content-between align-items-center flex-wrap gap-3"
                    >
                        <div class="hint-text">
                            Mostrando <b>5</b> de <b>25</b> entradas
                        </div>

                        <nav>
                            <ul class="pagination mb-0">
                                <li class="page-item disabled">
                                    <a class="page-link" href="#"> Anterior </a>
                                </li>

                                <li class="page-item">
                                    <a class="page-link" href="#">1</a>
                                </li>

                                <li class="page-item active">
                                    <a class="page-link" href="#">2</a>
                                </li>

                                <li class="page-item">
                                    <a class="page-link" href="#">3</a>
                                </li>

                                <li class="page-item">
                                    <a class="page-link" href="#">
                                        Siguiente
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <!-- ADD MODAL -->
        <div class="modal fade" id="addProductModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form id="addProductForm">
                        <div class="modal-header">
                            <h5 class="modal-title">Añadir Producto</h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>

                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label"> Nombre </label>

                                <input
                                    id="addNombre"
                                    type="text"
                                    class="form-control"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label class="form-label"> Precio </label>

                                <input
                                    id="addPrecio"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    step="0.01"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label class="form-label"> Stock </label>

                                <input
                                    id="addStock"
                                    type="number"
                                    class="form-control"
                                    required
                                />
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>

                            <button type="submit" class="btn btn-success">
                                Añadir
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- EDIT MODAL -->
        <div class="modal fade" id="editProductModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form id="editProductForm">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar Producto</h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label"> ID </label>

                                <input
                                    id="editId"
                                    type="text"
                                    class="form-control"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label class="form-label"> Nombre </label>

                                <input
                                    id="editNombre"
                                    type="text"
                                    class="form-control"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Precio</label>

                                <input
                                    id="editPrecio"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    step="0.01"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Stock</label>

                                <input
                                    id="editStock"
                                    type="number"
                                    class="form-control"
                                    min="0"
                                    required
                                />
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>

                            <button type="submit" class="btn btn-primary">
                                Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- DELETE MODAL -->
        <div class="modal fade" id="deleteProductModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form>
                        <div class="modal-header">
                            <h5 class="modal-title">Eliminar Producto</h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>

                        <div class="modal-body">
                            <p>¿Está seguro que desea borrar esta instancia?</p>

                            <p class="text-warning">
                                <small>
                                    Esta acción no se puede deshacer.
                                </small>
                            </p>
                        </div>

                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>

                            <button type="submit" class="btn btn-danger">
                                Eliminar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Custom JS -->
        <script src="/frontend/js/catalogo/catalogo.js"></script>
    </body>
</html>
