<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Cloud Catalog</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Diseño del Box de Éxito */
        .success-box {
            background-color: #e8f8f5;
            border: 2px solid #00a86b;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            margin-top: 20px;
            animation: fadeIn 0.4s ease-in-out;
        }
        .success-icon {
            font-size: 48px;
            color: #00a86b;
            margin-bottom: 16px;
        }
        .success-title {
            color: #111;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .success-text {
            color: #555;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="form-side" style="width: 100%; max-width: 500px; margin: 0 auto;">
            <div class="login-card">
                
                <div id="form-container">
                    <h2>Nueva Contraseña</h2>
                    <p class="subtitle">Ingresa tu nueva clave de acceso</p>

                    <div id="msg" class="msg-box"></div>

                    <div class="form-box" id="reset-box">
                        <input class="input-box" type="password" id="new-password" placeholder="Nueva contraseña">
                        <input class="input-box" type="password" id="confirm-password" placeholder="Confirmar contraseña">

                        <button class="btn" onclick="actualizarContrasena()">Actualizar Contraseña</button>
                        
                        <p class="signup" style="margin-top: 24px;">
                            <a href="index.html" style="color: #00a86b; text-decoration: none;">Volver al Inicio</a>
                        </p>
                    </div>
                </div>

                <div id="success-container" style="display: none;">
                    <div class="success-box">
                        <div class="success-icon">✓</div>
                        <div class="success-title">Contraseña Actualizada</div>
                        <p class="success-text">Tu credencial de acceso ha sido modificada con éxito. Ya puedes ingresar al catálogo con seguridad.</p>
                        <button class="btn" onclick="window.location.href='/index.html'">Ir al Iniciar Sesión</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('msg').innerText = 'Token inválido o ausente.';
            document.getElementById('msg').className = 'msg-box error';
            document.getElementById('reset-box').style.display = 'none';
        }

        async function actualizarContrasena() {
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const msgBox = document.getElementById('msg');

            if (!password || !confirmPassword) {
                msgBox.innerText = 'Por favor, llena ambos campos.';
                msgBox.className = 'msg-box error';
                return;
            }

            if (password !== confirmPassword) {
                msgBox.innerText = 'Las contraseñas no coinciden.';
                msgBox.className = 'msg-box error';
                return;
            }

            try {
                msgBox.innerText = 'Actualizando...';
                msgBox.className = 'msg-box ok';

                // Llamamos a la API relativa aprovechando que Express sirve el frontend
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    msgBox.innerText = data.error || 'Error al actualizar';
                    msgBox.className = 'msg-box error';
                    return;
                }

                // Ocultamos el formulario y mostramos el box verde
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('success-container').style.display = 'block';

            } catch (error) {
                msgBox.innerText = 'No se pudo conectar con el servidor.';
                msgBox.className = 'msg-box error';
            }
        }
    </script>
</body>
</html>
